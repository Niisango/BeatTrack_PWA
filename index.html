<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatTrack PWA Manager (Tailwind v4)</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkJlYXRUcmFjayBNYW5hZ2VyIiwKICAic2hvcnRfbmFtZSI6ICJCZWF0VHJhY2siLAogICJzdGFyd_t1cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIzM4YmRmOCIKfQ==">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./tailwind.css">
    <script src="https://unpkg.com/tailwindcss@4"></script>
</head>
<body class="antialiased">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="text-left">
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-linear-to-r from-blue-500 to-emerald-500 uppercase tracking-tight">
                        BeatTrack PWA
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Tailwind v4 Optimized Edition</p>
                </div>
                <button onclick="toggleTheme()" class="md:hidden p-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
                    <span id="themeIconMobile"></span>
                </button>
            </div>
            
            <div class="flex items-center gap-4 w-full md:w-auto">
                <nav class="flex flex-grow md:flex-grow-0 gap-2 md:gap-4 border-b border-slate-200 dark:border-slate-800 justify-center overflow-x-auto no-scrollbar">
                    <button id="tabSearch" class="pb-2 px-3 font-bold transition-all tab-active text-xs md:text-sm whitespace-nowrap">PREVIEW</button>
                    <button id="tabEdit" class="pb-2 px-3 font-bold transition-all text-slate-400 dark:text-slate-500 hover:text-blue-500 text-xs md:text-sm whitespace-nowrap">EDITOR</button>
                    <button id="tabSettings" class="pb-2 px-3 font-bold transition-all text-slate-400 dark:text-slate-500 hover:text-blue-500 text-xs md:text-sm whitespace-nowrap">STORAGE</button>
                    <button id="tabVersion" class="pb-2 px-3 font-bold transition-all text-slate-400 dark:text-slate-500 hover:text-blue-500 text-xs md:text-sm whitespace-nowrap">VERSION</button>
                </nav>
                
                <button onclick="toggleTheme()" class="hidden md:flex items-center justify-center p-2.5 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:ring-2 ring-blue-500/50 transition-all">
                    <span id="themeIconDesktop"></span>
                </button>
            </div>
        </header>

        <!-- Search View -->
        <div id="viewSearch" class="block space-y-6">
            <div class="glass-morphism rounded-2xl p-4 shadow-xl">
                <input type="text" id="globalSearch" placeholder="曲名、アーティスト、難易度で検索..." 
                       class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>

            <div class="flex justify-between items-center px-2">
                <h2 class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                    Search Results: <span id="resultCount" class="text-blue-500 text-sm">0</span>
                </h2>
                <div id="offlineBadge" class="text-[10px] bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 px-2 py-0.5 rounded border border-emerald-200 dark:border-emerald-500/20 uppercase font-bold">
                    Online
                </div>
            </div>

            <div id="songList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- Editor View -->
        <div id="viewEdit" class="hidden">
            <div class="glass-morphism rounded-2xl p-4 md:p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-800 dark:text-slate-200">Database Editor</h3>
                    <button id="addRowBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                        + 新曲追加
                    </button>
                </div>
                
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-100 dark:bg-slate-900/50 text-slate-500 border-b border-slate-200 dark:border-slate-800">
                            <tr>
                                <th class="p-3 font-bold uppercase text-[10px]">Track</th>
                                <th class="p-3 font-bold uppercase text-[10px] hidden md:table-cell">Artist</th>
                                <th class="p-3 font-bold uppercase text-[10px]">LV</th>
                                <th class="p-3 font-bold uppercase text-[10px] text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="editorTableBody" class="divide-y divide-slate-100 dark:divide-slate-800/40"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="viewSettings" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-morphism rounded-2xl p-6">
                <h3 class="font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    データ入出力
                </h3>
                <div class="flex flex-col gap-3">
                    <button id="exportBtn" class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 py-3 rounded-xl text-sm font-bold border border-slate-200 dark:border-slate-700 transition-all">JSONを書き出す</button>
                    <label class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 py-3 rounded-xl text-sm font-bold border border-slate-200 dark:border-slate-700 transition-all text-center cursor-pointer">
                        JSONから読み込む
                        <input type="file" id="importFile" class="hidden" accept=".json">
                    </label>
                </div>
            </div>
            <div class="glass-morphism rounded-2xl p-6 border-t-4 border-red-500/50">
                <h3 class="font-bold text-red-600 dark:text-red-400 mb-4">危険な操作</h3>
                <button id="resetDataBtn" class="w-full bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 text-red-600 py-3 rounded-xl text-sm font-bold border border-red-200 dark:border-red-900/30 transition-all">全データをリセットする</button>
            </div>
        </div>

        <!-- Version View -->
        <div id="viewVersion" class="hidden">
            <div class="max-w-2xl mx-auto glass-morphism rounded-2xl p-8 border-t-4 border-blue-500 shadow-xl text-center">
                <h2 class="text-2xl font-bold mb-2">BeatTrack Manager</h2>
                <p class="text-slate-500 text-sm mb-6 font-mono uppercase tracking-widest">v1.2.3 Tailwind v4</p>
                <div id="changelogContainer" class="changelog-content text-left p-4 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-800 max-h-96 overflow-y-auto custom-scrollbar">
                    <p class="text-center py-8">Loading updates...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden">
        <div class="glass-morphism w-full max-w-xl rounded-2xl overflow-hidden shadow-2xl border-t-4 border-blue-500 p-6">
            <h2 class="text-xl font-bold mb-6">楽曲情報の更新</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Title</label>
                    <input type="text" id="edit-title" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2">
                </div>
                <!-- ... other fields ... -->
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-800 px-4 text-xs font-bold uppercase transition-colors">Cancel</button>
                <button id="saveEditBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-lg font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition-all">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- Theme & Persistence ---
        const THEME_KEY = 'BEATTRACK_THEME';
        const applyTheme = (theme) => {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            const icon = isDark 
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>`;
            document.getElementById('themeIconDesktop').innerHTML = icon;
            document.getElementById('themeIconMobile').innerHTML = icon;
        };

        const toggleTheme = () => {
            const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        };

        // --- Core Logic ---
        let songs = [];
        const STORAGE_KEY = 'BEATTRACK_DB_v1';
        const loadSongs = () => {
            const stored = localStorage.getItem(STORAGE_KEY);
            songs = stored ? JSON.parse(stored) : [
                { id: 1, title: "Cybernetic Love", artist: "NEO-S", genre: "TECHNO", bpm: 175, level: 12 },
                { id: 2, title: "Sakura Memories", artist: "Hanako", genre: "J-POP", bpm: 160, level: 8 }
            ];
            if (!stored) saveSongs();
        };
        const saveSongs = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));

        // --- Render Helpers ---
        const renderPreview = () => {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const filtered = songs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
            document.getElementById('resultCount').textContent = filtered.length;
            document.getElementById('songList').innerHTML = filtered.map(s => `
                <div class="glass-morphism p-4 rounded-xl border-l-4 border-blue-500 hover:scale-[1.02] transition-all cursor-pointer shadow-sm" onclick="openEditModal(${s.id})">
                    <div class="flex justify-between mb-1">
                        <span class="text-[9px] font-bold text-blue-500 bg-blue-100 dark:bg-blue-900/30 px-1.5 py-0.5 rounded uppercase">${s.genre}</span>
                        <span class="font-black italic text-slate-700 dark:text-slate-200">LV ${s.level}</span>
                    </div>
                    <h3 class="font-bold text-sm truncate">${s.title}</h3>
                    <p class="text-[10px] text-slate-500 truncate">${s.artist}</p>
                </div>
            `).join('');
        };

        async function loadChangelog() {
            const container = document.getElementById('changelogContainer');
            try {
                const res = await fetch('CHANGELOG.md');
                const md = await res.text();
                container.innerHTML = md
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^\- (.*$)/gim, '<li>$1</li>')
                    .replace(/\n\n/gim, '<p></p>');
            } catch (e) { container.innerHTML = "Error loading changelog."; }
        }

        // --- Tabs ---
        const switchTab = (id) => {
            ['Search', 'Edit', 'Settings', 'Version'].forEach(v => {
                const isTarget = v.toLowerCase() === id;
                document.getElementById('view' + v).classList.toggle('hidden', !isTarget);
                document.getElementById('tab' + v).classList.toggle('tab-active', isTarget);
                document.getElementById('tab' + v).classList.toggle('text-slate-400', !isTarget);
            });
            if (id === 'version') loadChangelog();
            if (id === 'search') renderPreview();
        };

        ['tabSearch', 'tabEdit', 'tabSettings', 'tabVersion'].forEach(tid => {
            document.getElementById(tid).onclick = () => switchTab(tid.replace('tab', '').toLowerCase());
        });

        // --- Init ---
        window.onload = () => {
            applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
            loadSongs();
            renderPreview();
            
            // Register SW
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            }
        };

        document.getElementById('globalSearch').oninput = renderPreview;

        function openEditModal(id) { /* Modal implementation... */ }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
